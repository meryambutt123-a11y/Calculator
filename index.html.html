<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Calculator</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #121212; /* very dark gray background */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .calculator {
    background: #1e1e1e; /* dark gray */
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    width: 340px;
  }

  .display {
    background: #2a2a2a;
    color: #ffffff;
    font-size: 2.2em;
    text-align: right;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    overflow-x: auto;
    box-shadow: inset 0 -4px 6px rgba(0,0,0,0.5);
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
  }

  button {
    padding: 20px;
    font-size: 1.3em;
    border: none;
    border-radius: 15px;
    background: #333333; /* dark button */
    color: #ffffff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px #111111;
  }

  button:hover {
    background: #444444;
  }

  button:active {
    transform: translateY(2px);
    box-shadow: 0 2px #111111;
  }

  .operator {
    background: #00ffc6; /* neon turquoise */
    color: #121212;
    font-weight: bold;
  }

  .operator:hover {
    background: #33ffda;
  }

  .equal {
    background: #ff6b81; /* soft neon pink */
    color: #ffffff;
    grid-column: span 2;
    font-weight: bold;
  }

  .equal:hover {
    background: #ff869a;
  }

  .clear {
    background: #ff3f3f; /* bright red */
    color: #ffffff;
    font-weight: bold;
  }

  .clear:hover {
    background: #ff5f5f;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="operator" onclick="appendValue('%')">%</button>
    <button class="operator" onclick="appendValue('/')">/</button>
    <button class="operator" onclick="appendValue('*')">*</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button class="operator" onclick="appendValue('-')">-</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button class="operator" onclick="appendValue('+')">+</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button class="equal" onclick="calculateResult()">=</button>

    <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
    <button onclick="appendValue('.')">.</button>
  </div>
</div>

<script>
  const display = document.getElementById('display');
  let currentInput = '';

  function appendValue(value) {
    if (currentInput === '0' && value !== '.') {
      currentInput = value;
    } else {
      currentInput += value;
    }
    display.textContent = currentInput;
  }

  function clearDisplay() {
    currentInput = '';
    display.textContent = '0';
  }

  function calculateResult() {
    try {
      let result = eval(currentInput);
      if(result === undefined) result = '';
      display.textContent = result;
      currentInput = result.toString();
    } catch {
      display.textContent = 'Error';
      currentInput = '';
    }
  }
</script>

</body>
</html>
